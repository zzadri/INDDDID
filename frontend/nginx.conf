server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "DENY"                              always;
    add_header X-Content-Type-Options    "nosniff"                           always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"   always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';"
        always;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Cookie            $http_cookie;
        proxy_pass_header  Set-Cookie;

        # Terraform apply can run for minutes (VM clone + cloud-init boot).
        proxy_connect_timeout 60s;
        proxy_send_timeout    1800s;
        proxy_read_timeout    1800s;
        send_timeout          1800s;
    }

    gzip on;
    gzip_vary on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/wasm;

    # Cache static assets aggressively (Angular hashed filenames)
    location ~* \.(js|css|woff2?|svg|ico|png|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
