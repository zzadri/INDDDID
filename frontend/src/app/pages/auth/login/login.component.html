<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">◈</span>
      <span class="logo-name">INDDID</span>
    </div>
    <h2 class="auth-title">Connexion</h2>
    <p class="auth-sub">Cartographie dynamique du SI</p>

    <form class="auth-form" (ngSubmit)="submit()" #f="ngForm">
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="demo@inddid.local" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required autocomplete="current-password">
      </div>

      <div class="auth-error" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn-primary" [disabled]="loading || !email || !password">
        {{ loading ? 'Connexion…' : 'Se connecter' }}
      </button>
    </form>

    <p class="auth-link">
      Pas encore de compte ? <a routerLink="/auth/register">Créer un compte</a>
    </p>

    <div class="auth-demo">
      <span class="text-muted" style="font-size:11px">Demo : demo&#64;inddid.local / demo1234</span>
    </div>
  </div>
</div>
