<div class="auth-shell">
  <div class="auth-card">
    <div class="auth-logo">
      <span class="logo-icon">◈</span>
      <span class="logo-name">INDDID</span>
    </div>
    <h2 class="auth-title">Créer un compte</h2>
    <p class="auth-sub">Commencez à cartographier votre SI</p>

    <form class="auth-form" (ngSubmit)="submit()">
      <div class="form-group">
        <label>Nom d'affichage</label>
        <input type="text" [(ngModel)]="displayName" name="displayName" placeholder="Jean Dupont">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" [(ngModel)]="email" name="email" placeholder="vous@domaine.com" required>
      </div>
      <div class="form-group">
        <label>Mot de passe <span class="text-faint">(min. 8 caractères)</span></label>
        <input type="password" [(ngModel)]="password" name="password" placeholder="••••••••" required>
      </div>

      <div class="auth-error" *ngIf="error">{{ error }}</div>

      <button type="submit" class="btn-primary" [disabled]="loading || !email || !password">
        {{ loading ? 'Création…' : 'Créer mon compte' }}
      </button>
    </form>

    <p class="auth-link">
      Déjà un compte ? <a routerLink="/auth/login">Se connecter</a>
    </p>
  </div>
</div>
